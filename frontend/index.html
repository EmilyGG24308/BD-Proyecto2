<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tienda — BD1 Proyecto 2</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}

    body{
      font-family:'Segoe UI',sans-serif;
      background:#fdfafc;
      color:#5b5563;
    }

    header{
      background:#b8c0ff;
      color:#4a4460;
      padding:1rem 2rem;
      display:flex;
      align-items:center;
      gap:1rem;
    }
    header h1{font-size:1.4rem}
    header small{
      font-size:.85rem;
      color:#6f6a8d;
    }

    nav{
      background:#d8d4ff;
      display:flex;
      gap:4px;
      padding:.5rem 2rem;
      flex-wrap:wrap;
    }
    nav button{
      background:transparent;
      border:none;
      color:#6f6a8d;
      padding:.5rem 1rem;
      cursor:pointer;
      border-radius:8px;
      font-size:.95rem;
    }
    nav button:hover,
    nav button.active{
      background:#f8c8dc;
      color:#4a4460;
    }

    main{
      padding:1.5rem 2rem;
      max-width:1200px;
      margin:auto;
    }
    section{display:none}
    section.active{display:block}

    h2{
      margin-bottom:1rem;
      color:#8a7fc9;
    }

    .card{
      background:#ffffff;
      border-radius:14px;
      padding:1.5rem;
      box-shadow:0 4px 12px rgba(184,176,220,.18);
      margin-bottom:1.5rem;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }
    th{
      background:#f4edff;
      padding:.6rem .8rem;
      text-align:left;
      font-size:.85rem;
      color:#6a6285;
    }
    td{
      padding:.5rem .8rem;
      border-bottom:1px solid #f0eaf5;
      font-size:.9rem;
    }
    tr:hover td{
      background:#fff5fa;
    }

    .form-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
      gap:1rem;
    }
    .form-group{
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    label{
      font-size:.85rem;
      font-weight:600;
      color:#6c6580;
    }
    input,select,textarea{
      padding:.5rem;
      border:1px solid #e2dff0;
      border-radius:8px;
      font-size:.9rem;
      width:100%;
      background:#fffdfd;
    }

    .btn{
      padding:.5rem 1.2rem;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-weight:600;
      font-size:.9rem;
    }
    .btn-primary{
      background:#c7b8ff;
      color:#4a4460;
    }
    .btn-danger{
      background:#ffb7c5;
      color:#5f3d47;
    }
    .btn-success{
      background:#b8f2d6;
      color:#3d5c4f;
    }
    .btn-warning{
      background:#ffe8a3;
      color:#6d5a2f;
    }
    .btn:hover{opacity:.88}

    .actions{
      display:flex;
      gap:6px;
    }
    .msg{
      padding:.75rem 1rem;
      border-radius:8px;
      margin-bottom:1rem;
      font-weight:600;
    }
    .msg.ok{
      background:#e5f8ee;
      color:#42765b;
    }
    .msg.err{
      background:#ffe8ee;
      color:#9b4b61;
    }

    .badge{
      display:inline-block;
      padding:2px 8px;
      border-radius:12px;
      font-size:.8rem;
      font-weight:700;
    }
    .badge-green{
      background:#dcf7ea;
      color:#42765b;
    }
    .badge-red{
      background:#ffd9e2;
      color:#9b4b61;
    }

    .stat-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
      gap:1rem;
      margin-bottom:1.5rem;
    }
    .stat{
      background:white;
      border-radius:14px;
      padding:1rem;
      box-shadow:0 4px 12px rgba(184,176,220,.18);
      text-align:center;
    }
    .stat .num{
      font-size:2rem;
      font-weight:700;
      color:#a28be7;
    }
    .stat .lbl{
      font-size:.85rem;
      color:#9a93aa;
      margin-top:4px;
    }

    .toolbar{
      display:flex;
      gap:.5rem;
      margin-bottom:1rem;
      flex-wrap:wrap;
      align-items:center;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Sistema de Inventario y Ventas</h1>
    <small>Bases de Datos - Proyecto 2 - Emily Gongora #24308</small>
  </div>
</header>

<nav>
  <button class="active" onclick="showTab('dashboard',this)"> Dashboard</button>
  <button onclick="showTab('productos',this)">📦 Productos</button>
  <button onclick="showTab('clientes',this)"> Clientes</button>
  <button onclick="showTab('ventas',this)">🛒 Ventas</button>
  <button onclick="showTab('reportes',this)"> Reportes</button>
</nav>

<main>
  <div id="msg-global"></div>

  <!-- DASHBOARD -->
  <section id="tab-dashboard" class="active">
    <h2>Dashboard</h2>
    <div class="stat-grid" id="stats"></div>
    <div class="card">
      <h3 style="margin-bottom:.8rem"> Últimas 5 ventas</h3>
      <div id="ultimas-ventas"></div>
    </div>
  </section>

  <!-- PRODUCTOS -->
  <section id="tab-productos">
    <h2>Gestión de Productos</h2>
    <div class="card">
      <h3 style="margin-bottom:1rem" id="prod-form-title">Agregar Producto</h3>
      <div class="form-grid">
        <input type="hidden" id="prod-id"/>
        <div class="form-group"><label>Nombre *</label><input type="text" id="prod-nombre"/></div>
        <div class="form-group"><label>Categoría *</label><select id="prod-categoria"></select></div>
        <div class="form-group"><label>Proveedor *</label><select id="prod-proveedor"></select></div>
        <div class="form-group"><label>Precio (Q) *</label><input type="number" id="prod-precio" step="0.01"/></div>
        <div class="form-group"><label>Stock *</label><input type="number" id="prod-stock"/></div>
        <div class="form-group"><label>Descripción</label><input type="text" id="prod-desc"/></div>
      </div>
      <div style="margin-top:1rem;display:flex;gap:.5rem">
        <button class="btn btn-primary" onclick="guardarProducto()"> Guardar</button>
        <button class="btn btn-warning" onclick="limpiarProd()">✖ Cancelar</button>
      </div>
    </div>
    <div class="card">
      <div class="toolbar">
        <input type="text" id="search-prod" placeholder=" 🔍︎ Buscar..." oninput="filtrarProductos()" style="max-width:250px"/>
      </div>
      <div id="productos-table"></div>
    </div>
  </section>

  <!-- CLIENTES -->
  <section id="tab-clientes">
    <h2>Gestión de Clientes</h2>
    <div class="card">
      <h3 style="margin-bottom:1rem" id="cli-form-title">Agregar Cliente</h3>
      <div class="form-grid">
        <input type="hidden" id="cli-id"/>
        <div class="form-group"><label>Nombre *</label><input type="text" id="cli-nombre"/></div>
        <div class="form-group"><label>Apellido *</label><input type="text" id="cli-apellido"/></div>
        <div class="form-group"><label>Email *</label><input type="email" id="cli-email"/></div>
        <div class="form-group"><label>Teléfono *</label><input type="text" id="cli-telefono"/></div>
      </div>
      <div style="margin-top:1rem;display:flex;gap:.5rem">
        <button class="btn btn-primary" onclick="guardarCliente()">Guardar</button>
        <button class="btn btn-warning" onclick="limpiarCli()">✖ Cancelar</button>
      </div>
    </div>
    <div class="card"><div id="clientes-table"></div></div>
  </section>

  <!-- VENTAS -->
  <section id="tab-ventas">
    <h2>Registrar Venta</h2>
    <div class="card">
      <div class="form-grid">
        <div class="form-group"><label>Cliente *</label><select id="venta-cliente"></select></div>
        <div class="form-group"><label>Empleado *</label><select id="venta-empleado"></select></div>
      </div>
      <hr style="margin:1rem 0"/>
      <h4>Agregar productos al carrito:</h4>
      <div class="form-grid" style="margin-top:.5rem">
        <div class="form-group"><label>Producto</label><select id="venta-producto"></select></div>
        <div class="form-group"><label>Cantidad</label><input type="number" id="venta-cantidad" value="1" min="1"/></div>
      </div>
      <button class="btn btn-success" style="margin-top:.5rem" onclick="agregarItem()"> ✚ Agregar al carrito</button>
      <div id="venta-items" style="margin-top:1rem"></div>
      <p style="margin-top:.5rem"><strong>Total: Q <span id="venta-total">0.00</span></strong></p>
      <button class="btn btn-primary" style="margin-top:1rem" onclick="procesarVenta()"> ✔ Procesar Venta</button>
    </div>
    <div class="card">
      <h3 style="margin-bottom:.8rem">Historial de Ventas</h3>
      <div id="ventas-table"></div>
    </div>
  </section>

  <!-- REPORTES -->
  <section id="tab-reportes">
    <h2>Reportes</h2>
    <div class="toolbar">
      <button class="btn btn-primary" onclick="cargarReporte('ventas-por-empleado')">Por Empleado</button>
      <button class="btn btn-primary" onclick="cargarReporte('productos-mas-vendidos')">📦 Más Vendidos</button>
      <button class="btn btn-primary" onclick="cargarReporte('clientes-frecuentes')"> ★ Clientes Frecuentes</button>
      <button class="btn btn-primary" onclick="cargarReporte('ventas-mensuales')">Mensual (CTE)</button>
      <button class="btn btn-primary" onclick="cargarReporte('detalle-ventas')"> 🗐 Detalle (VIEW)</button>
      <button class="btn btn-success" onclick="exportarCSV()">⬇ Exportar CSV</button>
    </div>
    <div class="card">
      <div id="reporte-title" style="font-weight:700;margin-bottom:1rem;color:#1a237e;font-size:1.1rem"></div>
      <div id="reporte-table"></div>
    </div>
  </section>
</main>

<script>
const API = 'http://localhost:3000/api';
let productosData = [];
let ventaItems    = [];

function showTab(tab, btn) {
  document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (btn) btn.classList.add('active');
  if (tab === 'dashboard') cargarDashboard();
  if (tab === 'productos')  cargarProductos();
  if (tab === 'clientes')   cargarClientes();
  if (tab === 'ventas')     cargarDatosVenta();
}

function showMsg(msg, tipo = 'ok') {
  const el = document.getElementById('msg-global');
  el.innerHTML = `<div class="msg ${tipo}">${msg}</div>`;
  setTimeout(() => el.innerHTML = '', 4000);
}

function mkTabla(data) {
  if (!data || !data.length) return '<p style="color:#888">Sin registros.</p>';
  const ths = Object.keys(data[0]).map(k => `<th>${k}</th>`).join('');
  const trs = data.map(row =>
    `<tr>${Object.values(row).map(v => `<td>${v ?? ''}</td>`).join('')}</tr>`
  ).join('');
  return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
}

// ── DASHBOARD ──────────────────────────────────────────────────────────────
async function cargarDashboard() {
  try {
    const [prods, clientes, ventas] = await Promise.all([
      fetch(`${API}/productos`).then(r => r.json()),
      fetch(`${API}/clientes`).then(r => r.json()),
      fetch(`${API}/ventas`).then(r => r.json()),
    ]);
    const totalQ = ventas.reduce((s, v) => s + parseFloat(v.total || 0), 0);
    document.getElementById('stats').innerHTML = `
      <div class="stat"><div class="num">${prods.length}</div><div class="lbl">Productos</div></div>
      <div class="stat"><div class="num">${clientes.length}</div><div class="lbl">Clientes</div></div>
      <div class="stat"><div class="num">${ventas.length}</div><div class="lbl">Ventas</div></div>
      <div class="stat"><div class="num">Q${totalQ.toFixed(0)}</div><div class="lbl">Total vendido</div></div>
    `;
    document.getElementById('ultimas-ventas').innerHTML = mkTabla(ventas.slice(0, 5));
  } catch (e) { showMsg('Error cargando dashboard: ' + e.message, 'err'); }
}

// ── PRODUCTOS ──────────────────────────────────────────────────────────────
async function cargarProductos() {
  try {
    const [data, cats, provs] = await Promise.all([
      fetch(`${API}/productos`).then(r => r.json()),
      fetch(`${API}/categorias`).then(r => r.json()),
      fetch(`${API}/proveedores`).then(r => r.json()),
    ]);
    productosData = data;
    document.getElementById('prod-categoria').innerHTML =
      cats.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');
    document.getElementById('prod-proveedor').innerHTML =
      provs.map(p => `<option value="${p.id}">${p.nombre}</option>`).join('');
    renderProductos(data);
  } catch (e) { showMsg('Error: ' + e.message, 'err'); }
}

function renderProductos(data) {
  document.getElementById('productos-table').innerHTML = `
    <table>
      <thead><tr><th>ID</th><th>Nombre</th><th>Categoría</th><th>Proveedor</th><th>Precio</th><th>Stock</th><th>Acciones</th></tr></thead>
      <tbody>${data.map(p => `<tr>
        <td>${p.id}</td><td>${p.nombre}</td><td>${p.categoria}</td><td>${p.proveedor}</td>
        <td>Q${parseFloat(p.precio_unitario).toFixed(2)}</td>
        <td><span class="badge ${p.stock > 5 ? 'badge-green' : 'badge-red'}">${p.stock}</span></td>
        <td class="actions">
          <button class="btn btn-warning" onclick="editarProducto(${p.id})">✎ᝰ. Editar</button>
          <button class="btn btn-danger"  onclick="eliminarProducto(${p.id})">🗑 Eliminar</button>
        </td>
      </tr>`).join('')}</tbody>
    </table>`;
}

function filtrarProductos() {
  const q = document.getElementById('search-prod').value.toLowerCase();
  renderProductos(productosData.filter(p =>
    p.nombre.toLowerCase().includes(q) || p.categoria.toLowerCase().includes(q)
  ));
}

function editarProducto(id) {
  const p = productosData.find(x => x.id === id);
  if (!p) return;
  document.getElementById('prod-id').value     = p.id;
  document.getElementById('prod-nombre').value = p.nombre;
  document.getElementById('prod-precio').value = p.precio_unitario;
  document.getElementById('prod-stock').value  = p.stock;
  document.getElementById('prod-desc').value   = p.descripcion || '';
  document.getElementById('prod-form-title').textContent = ' Editar Producto';
  window.scrollTo(0, 0);
}

async function guardarProducto() {
  const id   = document.getElementById('prod-id').value;
  const body = {
    nombre:          document.getElementById('prod-nombre').value.trim(),
    categoria_id:    document.getElementById('prod-categoria').value,
    proveedor_id:    document.getElementById('prod-proveedor').value,
    precio_unitario: document.getElementById('prod-precio').value,
    stock:           document.getElementById('prod-stock').value,
    descripcion:     document.getElementById('prod-desc').value,
  };
  if (!body.nombre || !body.precio_unitario || body.stock === '')
    return showMsg('Nombre, precio y stock son obligatorios', 'err');
  try {
    const r = await fetch(id ? `${API}/productos/${id}` : `${API}/productos`, {
      method: id ? 'PUT' : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const d = await r.json();
    if (!r.ok) return showMsg(d.error, 'err');
    showMsg(id ? '✔ Producto actualizado' : '✔ Producto creado');
    limpiarProd();
    cargarProductos();
  } catch (e) { showMsg(e.message, 'err'); }
}

async function eliminarProducto(id) {
  if (!confirm('¿Segura que quieres eliminar este producto?')) return;
  try {
    const r = await fetch(`${API}/productos/${id}`, { method: 'DELETE' });
    const d = await r.json();
    if (!r.ok) return showMsg(d.error, 'err');
    showMsg('🗑 Producto eliminado');
    cargarProductos();
  } catch (e) { showMsg(e.message, 'err'); }
}

function limpiarProd() {
  ['prod-id','prod-nombre','prod-precio','prod-stock','prod-desc'].forEach(id =>
    document.getElementById(id).value = ''
  );
  document.getElementById('prod-form-title').textContent = 'Agregar Producto';
}

// ── CLIENTES ───────────────────────────────────────────────────────────────
let clientesData = [];

async function cargarClientes() {
  try {
    clientesData = await fetch(`${API}/clientes`).then(r => r.json());
    document.getElementById('clientes-table').innerHTML = `
      <table>
        <thead><tr><th>ID</th><th>Nombre</th><th>Apellido</th><th>Email</th><th>Teléfono</th><th>Acciones</th></tr></thead>
        <tbody>${clientesData.map(c => `<tr>
          <td>${c.id}</td><td>${c.nombre}</td><td>${c.apellido}</td>
          <td>${c.email}</td><td>${c.telefono}</td>
          <td class="actions">
            <button class="btn btn-warning" onclick="editarCliente(${c.id})">✎ᝰ. Editar</button>
            <button class="btn btn-danger"  onclick="eliminarCliente(${c.id})">🗑 Eliminar</button>
          </td>
        </tr>`).join('')}</tbody>
      </table>`;
  } catch (e) { showMsg('Error: ' + e.message, 'err'); }
}

function editarCliente(id) {
  const c = clientesData.find(x => x.id === id);
  if (!c) return;
  document.getElementById('cli-id').value       = c.id;
  document.getElementById('cli-nombre').value   = c.nombre;
  document.getElementById('cli-apellido').value = c.apellido;
  document.getElementById('cli-email').value    = c.email;
  document.getElementById('cli-telefono').value = c.telefono;
  document.getElementById('cli-form-title').textContent = '✎ᝰ Editar Cliente';
  window.scrollTo(0, 0);
}

async function guardarCliente() {
  const id   = document.getElementById('cli-id').value;
  const body = {
    nombre:   document.getElementById('cli-nombre').value.trim(),
    apellido: document.getElementById('cli-apellido').value.trim(),
    email:    document.getElementById('cli-email').value.trim(),
    telefono: document.getElementById('cli-telefono').value.trim(),
  };
  if (!body.nombre || !body.apellido || !body.email || !body.telefono)
    return showMsg('Todos los campos son obligatorios', 'err');
  try {
    const r = await fetch(id ? `${API}/clientes/${id}` : `${API}/clientes`, {
      method: id ? 'PUT' : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const d = await r.json();
    if (!r.ok) return showMsg(d.error, 'err');
    showMsg(id ? '✔ Cliente actualizado' : '✔ Cliente creado');
    limpiarCli();
    cargarClientes();
  } catch (e) { showMsg(e.message, 'err'); }
}

async function eliminarCliente(id) {
  if (!confirm('¿Segura que quieres eliminar este cliente?')) return;
  try {
    const r = await fetch(`${API}/clientes/${id}`, { method: 'DELETE' });
    const d = await r.json();
    if (!r.ok) return showMsg(d.error, 'err');
    showMsg('🗑 Cliente eliminado');
    cargarClientes();
  } catch (e) { showMsg(e.message, 'err'); }
}

function limpiarCli() {
  ['cli-id','cli-nombre','cli-apellido','cli-email','cli-telefono'].forEach(id =>
    document.getElementById(id).value = ''
  );
  document.getElementById('cli-form-title').textContent = 'Agregar Cliente';
}

// ── VENTAS ─────────────────────────────────────────────────────────────────
async function cargarDatosVenta() {
  try {
    const [clientes, empleados, prods, ventas] = await Promise.all([
      fetch(`${API}/clientes`).then(r => r.json()),
      fetch(`${API}/empleados`).then(r => r.json()),
      fetch(`${API}/productos`).then(r => r.json()),
      fetch(`${API}/ventas`).then(r => r.json()),
    ]);
    document.getElementById('venta-cliente').innerHTML =
      clientes.map(c => `<option value="${c.id}">${c.nombre} ${c.apellido}</option>`).join('');
    document.getElementById('venta-empleado').innerHTML =
      empleados.map(e => `<option value="${e.id}">${e.nombre} ${e.apellido}</option>`).join('');
    document.getElementById('venta-producto').innerHTML =
      prods.map(p => `<option value="${p.id}" data-precio="${p.precio_unitario}">${p.nombre} — Q${p.precio_unitario} (Stock: ${p.stock})</option>`).join('');
    ventaItems = [];
    renderItems();
    document.getElementById('ventas-table').innerHTML = mkTabla(ventas);
  } catch (e) { showMsg('Error: ' + e.message, 'err'); }
}

function agregarItem() {
  const sel      = document.getElementById('venta-producto');
  const opt      = sel.options[sel.selectedIndex];
  const cantidad = parseInt(document.getElementById('venta-cantidad').value);
  if (!cantidad || cantidad < 1) return showMsg('La cantidad debe ser al menos 1', 'err');
  const producto_id = parseInt(sel.value);
  const precio      = parseFloat(opt.dataset.precio);
  const nombre      = opt.text.split('—')[0].trim();
  const existing    = ventaItems.find(i => i.producto_id === producto_id);
  if (existing) existing.cantidad += cantidad;
  else ventaItems.push({ producto_id, nombre, precio, cantidad });
  renderItems();
}

function renderItems() {
  const total = ventaItems.reduce((s, i) => s + i.precio * i.cantidad, 0);
  document.getElementById('venta-total').textContent = total.toFixed(2);
  document.getElementById('venta-items').innerHTML = !ventaItems.length
    ? '<p style="color:#888">Carrito vacío.</p>'
    : `<table>
        <thead><tr><th>Producto</th><th>Precio unit.</th><th>Cantidad</th><th>Subtotal</th><th></th></tr></thead>
        <tbody>${ventaItems.map((i, idx) => `<tr>
          <td>${i.nombre}</td>
          <td>Q${i.precio.toFixed(2)}</td>
          <td>${i.cantidad}</td>
          <td>Q${(i.precio * i.cantidad).toFixed(2)}</td>
          <td><button class="btn btn-danger" onclick="quitarItem(${idx})">✖</button></td>
        </tr>`).join('')}</tbody>
      </table>`;
}

function quitarItem(idx) { ventaItems.splice(idx, 1); renderItems(); }

async function procesarVenta() {
  if (!ventaItems.length) return showMsg('Agrega al menos un producto al carrito', 'err');
  const body = {
    cliente_id:  parseInt(document.getElementById('venta-cliente').value),
    empleado_id: parseInt(document.getElementById('venta-empleado').value),
    items: ventaItems.map(i => ({ producto_id: i.producto_id, cantidad: i.cantidad })),
  };
  try {
    const r = await fetch(`${API}/ventas`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const d = await r.json();
    if (!r.ok) return showMsg('☓ ' + d.error, 'err');
    showMsg(`✔ Venta #${d.venta_id} registrada — Total: Q${d.total}`);
    ventaItems = [];
    cargarDatosVenta();
  } catch (e) { showMsg(e.message, 'err'); }
}

// ── REPORTES ───────────────────────────────────────────────────────────────
const titulos = {
  'ventas-por-empleado':    ' Ventas por Empleado — GROUP BY + HAVING',
  'productos-mas-vendidos': '📦 Productos Más Vendidos — Subquery en FROM',
  'clientes-frecuentes':    '★ Clientes Frecuentes — EXISTS',
  'ventas-mensuales':       ' Ventas Mensuales — CTE (WITH)',
  'detalle-ventas':         '🗐 Detalle de Ventas — VIEW',
};

async function cargarReporte(tipo) {
  document.getElementById('reporte-title').textContent = titulos[tipo] || tipo;
  document.getElementById('reporte-table').innerHTML = '<p>Cargando...</p>';
  try {
    const data = await fetch(`${API}/reportes/${tipo}`).then(r => r.json());
    document.getElementById('reporte-table').innerHTML = mkTabla(data);
  } catch (e) { showMsg('Error: ' + e.message, 'err'); }
}

function exportarCSV() { window.open(`${API}/exportar/ventas-csv`, '_blank'); }

// Cargar dashboard al abrir
cargarDashboard();
</script>
